name: Validate and package skill
on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate skill (frontmatter, reference + section links, regressions, hygiene)
        run: python3 scripts/validate.py
  package:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build clean skill archive
        run: |
          zip -r qhse-skill.zip qhse -x "*.DS_Store" -x "__MACOSX/*"
          cp qhse-skill.zip qhse.skill
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qhse-skill
          path: |
            qhse-skill.zip
            qhse.skill
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            qhse-skill.zip
            qhse.skill
          generate_release_notes: true
